    <style>

<body>

<div class="container">
    <h1>📄 İnteraktiv PDF Quiz Yaradıcı "Sərxan Əliyev"</h1>
    <div class="sub">⚡ Cavab variantları hər dəfə randomlaşır | Sıra ilə və ya təsadüfi</div>    
    
    <div class="upload-section" onclick="document.getElementById('pdfFile').click()">
        <input type="file" id="pdfFile" class="file-input" accept=".pdf">
        <button class="btn-primary" type="button">📁 PDF faylını seçin</button>
        <div id="statusMessage" class="status">📌 Hələ fayl seçilməyib</div>
        <div style="font-size:12px; margin-top:12px; color:#5b6e8c;">
            Açılış Formati: 1. Sual mətni <br> • Variant A <br> √ Düzgün variant
        </div>
    </div>

    <div id="controlPanel" style="display: none;">
        <div class="control-panel">
            <div class="mode-selector">
                <label>
                    <input type="radio" name="quizMode" value="sequential" checked> 📚 Sıra ilə
                </label>
                <label>
                    <input type="radio" name="quizMode" value="random"> 🎲 Təsadüfi
                </label>
                <label style="border-left: 1px solid #cbd5e1; padding-left: 12px; margin-left: 4px; color: #b91c1c;">
                    <input type="checkbox" id="filterLongestCorrect"> ✂️ Qısalar (Uzun cavabı gizlə)
                </label>
            </div>
            <div class="panel-buttons">
                <button id="reorderQuestionsBtn" class="btn-primary" style="background:#475569; box-shadow:none;">🔄 Tətbiq et</button>
                <button id="restartQuizBtn" class="btn-primary" style="background:#0f3b5c;">🔄 Quiz-i sıfırla</button>
                <button id="showAllAnswersBtn" class="btn-primary" style="background:#10b981; box-shadow:none;">👁️ Cavabları Göstər</button>
            </div>
        </div>
    </div>

    <div id="quizDisplay"></div>
    <footer>📱 Mobil dostu interfeys | Cavab variantlarının sırası hər dəfə dəyişir</footer>
</div>

<script>
// PDF.js işçi konfiqurasiyası
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

// Qlobal dəyişənlər
let rawQuestions = [];       
let currentQuestions = [];   
let currentOrder = "sequential";  
let isPdfLoaded = false;

// DOM elementləri
const pdfInput = document.getElementById('pdfFile');
const statusDiv = document.getElementById('statusMessage');
const quizContainer = document.getElementById('quizDisplay');
const controlPanelDiv = document.getElementById('controlPanel');
const reorderBtn = document.getElementById('reorderQuestionsBtn');
const restartBtn = document.getElementById('restartQuizBtn');
const showAnswersBtn = document.getElementById('showAllAnswersBtn'); // Yeni element müraciəti
const filterCheckbox = document.getElementById('filterLongestCorrect'); 

// === KÖMƏKÇİ FUNKSİYALAR ===

// Variantları randomlaşdırmaq (correct dəyərini saxlayır)
function shuffleOptions(questionObj) {
    if (!questionObj.options || questionObj.options.length === 0) return {...questionObj};
    
    const optionsWithFlag = questionObj.options.map(opt => ({
        text: opt,
        isCorrect: (opt === questionObj.correct)
    }));
    
    for (let i = optionsWithFlag.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [optionsWithFlag[i], optionsWithFlag[j]] = [optionsWithFlag[j], optionsWithFlag[i]];
    }
    
    const shuffledOptions = optionsWithFlag.map(item => item.text);
    const newCorrect = optionsWithFlag.find(item => item.isCorrect)?.text || null;
    
    return {
        question: questionObj.question,
        options: shuffledOptions,
        correct: newCorrect,
        originalCorrect: questionObj.originalCorrect, 
        isLongestCorrect: questionObj.isLongestCorrect 
    };
}

// Bütün sualların variantlarını randomlaşdırır
function randomizeAllOptions(questionsArray) {
    return questionsArray.map(q => shuffleOptions(q));
}

// Sualların sırasını rejimə görə düzür
function reorderQuestionsByMode(questionsArray, mode) {
    if (mode === "sequential") {
        return [...questionsArray];
    } else {
        const shuffled = [...questionsArray];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
    }
}

// Tam quiz qurulması (variant random + sıralama + uzun cavab filtri)
function buildAndRenderQuiz() {
    if (!rawQuestions.length) {
        quizContainer.innerHTML = '<div class="empty-message">⚠️ Heç bir sual tapılmadı. PDF formatını yoxlayın (1., • , √).</div>';
        controlPanelDiv.style.display = 'none';
        return;
    }
    
    controlPanelDiv.style.display = 'block';
    
    let processedQuestions = [...rawQuestions];
    
    if (filterCheckbox && filterCheckbox.checked) {
        processedQuestions = processedQuestions.filter(q => !q.isLongestCorrect);
    }
    
    if (processedQuestions.length === 0) {
        quizContainer.innerHTML = '<div class="empty-message">✂️ Seçilmiş filtrə əsasən bütün suallar pas keçildi (Hamısının düzgün cavabı ən uzundur).</div>';
        return;
    }
    
    const questionsWithShuffledOptions = randomizeAllOptions(processedQuestions);
    const finalOrderedQuestions = reorderQuestionsByMode(questionsWithShuffledOptions, currentOrder);
    currentQuestions = finalOrderedQuestions;
    
    renderQuizToDOM(currentQuestions);
}

// Seçilmiş rejimi və filtri tətbiq etmək
function applyModeAndRefresh() {
    if (!rawQuestions.length) {
        alert("Zəhmət olmasa əvvəlcə PDF faylı yükləyin.");
        return;
    }
    const selectedMode = document.querySelector('input[name="quizMode"]:checked').value;
    currentOrder = selectedMode;
    buildAndRenderQuiz();
}

function resetQuiz() {
    if (!rawQuestions.length) {
        alert("Heç bir sual yoxdur, zəhmət olmasa PDF seçin.");
        return;
    }
    buildAndRenderQuiz();
}

// BÜTÜN DÜZGÜN CAVABLARI GÖSTƏRƏN YENİ FUNKSİYA
function showAllAnswers() {
    if (!rawQuestions.length || !currentQuestions.length) {
        alert("Göstəriləcək heç bir test tapılmadı.");
        return;
    }

    // DOM-dakı bütün sual bloklarını tapırıq
    const questionBlocks = quizContainer.querySelectorAll('.question-block');
    
    questionBlocks.forEach((block, index) => {
        const questionData = currentQuestions[index];
        if (!questionData) return;

        const optionButtons = block.querySelectorAll('.option-btn');
        const feedbackDiv = block.querySelector('.feedback');

        // Variant butonlarını dondururuq
        optionButtons.forEach(btn => {
            btn.disabled = true;
            // Əgər butonun mətni düzgün cavabla eynidirsə, yaşıl rəng edin
            if (btn.innerText === questionData.correct) {
                btn.classList.add('correct');
            }
        });

        // Feedback panelini aktivləşdirib məlumatı yazırıq
        if (feedbackDiv) {
            feedbackDiv.className = 'feedback success';
            feedbackDiv.innerHTML = `💡 Sistem tərəfindən göstərildi: Doğru cavab: <strong>${questionData.correct || 'Məlum deyil'}</strong>`;
            feedbackDiv.style.display = 'block';
        }
    });
}

// Cavab seçimləri üçün hadisələr
function attachAnswerEvents(questionBlock, questionData, feedbackDiv, optionButtons) {
    optionButtons.forEach(btn => {
        if (btn._listener) btn.removeEventListener('click', btn._listener);
        const handler = () => {
            optionButtons.forEach(b => b.disabled = true);
            const selectedText = btn.innerText;
            
            if (selectedText === questionData.correct) {
                btn.classList.add('correct');
                feedbackDiv.className = 'feedback success';
                feedbackDiv.innerHTML = "🎉 Doğru cavab! Təbriklər! 🎉";
            } else {
                btn.classList.add('wrong');
                feedbackDiv.className = 'feedback error';
                const correctAnswerText = questionData.correct || 'Məlum deyil';
                feedbackDiv.innerHTML = `❌ Səhv! Doğru cavab: <strong>${correctAnswerText}</strong>`;
                optionButtons.forEach(b => {
                    if (b.innerText === questionData.correct) {
                        b.classList.add('correct');
                    }
                });
            }
            feedbackDiv.style.display = 'block';
        };
        btn.addEventListener('click', handler);
        btn._listener = handler;
    });
}

// DOM-a sualları çəkir
function renderQuizToDOM(questionsArray) {
    quizContainer.innerHTML = '';
    if (!questionsArray.length) {
        quizContainer.innerHTML = '<div class="empty-message">❌ Sual tapılmadı. PDF strukturuna uyğun olmalıdır.</div>';
        return;
    }
    
    questionsArray.forEach((q, idx) => {
        const qBlock = document.createElement('div');
        qBlock.className = 'question-block';
        
        const title = document.createElement('div');
        title.className = 'question-title';
        title.innerText = `${idx+1}. ${q.question}`;
        qBlock.appendChild(title);
        
        const optionsContainer = document.createElement('div');
        optionsContainer.className = 'options-area';
        
        const feedback = document.createElement('div');
        feedback.className = 'feedback';
        
        const btns = [];
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            optionsContainer.appendChild(btn);
            btns.push(btn);
        });
        
        qBlock.appendChild(optionsContainer);
        qBlock.appendChild(feedback);
        quizContainer.appendChild(qBlock);
        
        attachAnswerEvents(qBlock, q, feedback, btns);
    });
}

// === PDF PARSER MƏNTİQİ ===
function parseQuizText(rawText) {
    let processed = rawText.replace(/(\d+\.)/g, '\n$1');
    processed = processed.replace(/([•√])/g, '\n$1');
    const lines = processed.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    
    const questions = [];
    let currentQuestion = null;
    
    for (let line of lines) {
        if (/^\d+\./.test(line)) {
            if (currentQuestion && currentQuestion.options.length > 0) {
                questions.push(currentQuestion);
            }
            currentQuestion = {
                question: line.replace(/^\d+\.\s*/, ''),
                options: [],
                correct: null
            };
        }
        else if (currentQuestion && (line.startsWith('•') || line.startsWith('√'))) {
            const isCorrect = line.startsWith('√');
            let optionText = line.substring(1).trim();
            if (optionText === "") optionText = "[Boş variant]";
            currentQuestion.options.push(optionText);
            if (isCorrect) {
                currentQuestion.correct = optionText;
            }
        }
    }
    
    if (currentQuestion && currentQuestion.options.length >= 2 && currentQuestion.correct) {
        questions.push(currentQuestion);
    }
    
    const validQuestions = questions.filter(q => q.options.length >= 2 && q.correct !== null);
    
    const analyzedQuestions = validQuestions.map(q => {
        let longestLength = 0;
        
        q.options.forEach(opt => {
            if (opt.length > longestLength) {
                longestLength = opt.length;
            }
        });
        
        const correctLength = q.correct.length;
        const longestOptionsCount = q.options.filter(opt => opt.length === longestLength).length;
        const isLongest = (correctLength === longestLength && longestOptionsCount === 1);
        
        return {
            ...q,
            isLongestCorrect: isLongest 
        };
    });
    
    return analyzedQuestions;
}

// PDF oxuma
async function extractQuizFromPDF(file) {
    const fileReader = new FileReader();
    return new Promise((resolve, reject) => {
        fileReader.onload = async function(evt) {
            try {
                const typedarray = new Uint8Array(evt.target.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                let fullText = "";
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(" ");
                    fullText += pageText + "\n";
                }
                resolve(fullText);
            } catch (err) {
                reject(err);
            }
        };
        fileReader.onerror = (err) => reject(err);
        fileReader.readAsArrayBuffer(file);
    });
}

// Fayl yüklənmə hadisəsi
pdfInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    statusDiv.style.color = '#2563eb';
    statusDiv.innerHTML = "⏳ PDF oxunur, analiz gedir...";
    quizContainer.innerHTML = '<div class="loading-placeholder">⏳ Məlumat hazırlanır...</div>';
    controlPanelDiv.style.display = 'none';
    
    try {
        const extractedText = await extractQuizFromPDF(file);
        const parsed = parseQuizText(extractedText);
        
        if (parsed.length === 0) {
            statusDiv.style.color = '#dc2626';
            statusDiv.innerHTML = "⚠️ Heç bir sual tapılmadı! Format: 1. Sual, • Variant, √ Düzgün";
            quizContainer.innerHTML = '<div class="empty-message">❌ Sual strukturuna uyğun məlumat aşkarlanmadı.<br><br> <strong>Nümunə:</strong><br>1. Azərbaycanın paytaxtı?<br> • Bakı<br> √ Bakı</div>';
            rawQuestions = [];
            return;
        }
        
        rawQuestions = parsed;
        statusDiv.style.color = '#10b981';
        statusDiv.innerHTML = `✅ Uğurlu! ${rawQuestions.length} sual tapıldı.`;
        
        const sequentialRadio = document.querySelector('input[value="sequential"]');
        if (sequentialRadio) sequentialRadio.checked = true;
        if (filterCheckbox) filterCheckbox.checked = false; 
        currentOrder = "sequential";
        
        buildAndRenderQuiz();
        
    } catch (error) {
        console.error(error);
        statusDiv.style.color = '#dc2626';
        statusDiv.innerHTML = "❌ Xəta: PDF oxumaq mümkün olmadı.";
        quizContainer.innerHTML = '<div class="empty-message">Fayl oxuma xətası. PDF faylını yoxlayın.</div>';
        rawQuestions = [];
        controlPanelDiv.style.display = 'none';
    }
});

// Düymələrə klik hadisələri
if (reorderBtn) reorderBtn.addEventListener('click', applyModeAndRefresh);
if (restartBtn) restartBtn.addEventListener('click', resetQuiz);
if (showAnswersBtn) showAnswersBtn.addEventListener('click', showAllAnswers); // Yeni hadisə dinləyicisi
